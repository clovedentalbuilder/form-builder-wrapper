<fx-component [fxData]="fxData" #fxComponent>
  <div class="custom-date-picker relative">
    <form [formGroup]="datePickerForm">

      <label for="date" class="input-label">
        {{ setting('label') }}<span class="field-required">*</span>
      </label>

      <div class="relative">
        <input
          type="date"
          id="date"
          name="date"
          formControlName="date"
          [min]="minDate"
          [max]="maxDate"
          (change)="onDateChange($event)"
          (blur)="onDateChange($event)"
          (keydown)="$event.preventDefault()"
          (paste)="$event.preventDefault()"
          (keypress)="$event.preventDefault()"
          (keyup)="$event.preventDefault()"
        />
      </div>

      <div>
        <!-- Required -->
        <small
          *ngIf="datePickerForm.get('date')?.touched && datePickerForm.get('date')?.errors?.['required']"
          class="text-red-500">
          {{ setting('datePickerErrorMessage') }}
        </small>

        <!-- Below min — Safari / iOS ignores HTML min attribute -->
        <small
          *ngIf="datePickerForm.get('date')?.touched && datePickerForm.get('date')?.errors?.['minDate']"
          class="text-red-500">
          Date cannot be before {{ minDate }}.
        </small>

        <!-- Above max — Safari / iOS ignores HTML max attribute -->
        <small
          *ngIf="datePickerForm.get('date')?.touched && datePickerForm.get('date')?.errors?.['maxDate']"
          class="text-red-500">
          Date cannot be after {{ maxDate }}.
        </small>
      </div>

    </form>
  </div>
</fx-component>
