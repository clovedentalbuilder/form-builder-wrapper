<lib-radio-button-with-other-settings-panel #fxComponent [fxData]="fxData" (configuration)="onSettingsChanged($event)">
  <div [ngClass]="radioConfig.customClass">
    <form [formGroup]="radioForm" class="w-full">

      <label class="font-semibold text-gray-800 block mb-2">
        {{ radioConfig.label }} <span class="field-required" *ngIf="isRequired">*</span>
      </label>

      <!-- 4-column grid: radio options + other textarea inline -->
      <div class="grid grid-cols-4 gap-3 items-start">

        <label
          *ngFor="let opt of options"
          class="flex items-start gap-2 cursor-pointer text-gray-700 py-1"
        >
          <input
            type="radio"
            formControlName="selectedRadioOption"
            [value]="opt.value"
            (change)="onSelectionChange(opt.value)"
            class="w-4 h-4 accent-blue-600 cursor-pointer flex-shrink-0 mt-1"
          />
          <span>{{ opt.label }}</span>
        </label>

        <!-- Other textarea: spans remaining columns in the same row -->
        <div *ngIf="showOtherInput" [style.grid-column]="textareaGridColumn" class="relative">
          <label class="input-label text-gray-700 block mb-1">
            {{ radioConfig.otherLabel }} <span class="field-required" *ngIf="isChildRequired">*</span>
          </label>

          <textarea
            formControlName="otherInput"
            placeholder="{{ radioConfig.otherPlaceholder }}"
            class="border border-gray-300 rounded-lg p-3 w-full resize-none shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            rows="3"
            [maxlength]="otherMaxLength"
            [ngClass]="{
              'bg-gray-100 text-gray-400 border-gray-300 cursor-not-allowed': radioForm.get('otherInput')?.disabled
            }"
          ></textarea>

          <div class="flex justify-between items-center">
            <span>
              <small
                *ngIf="radioForm.get('otherInput')?.touched && radioForm.get('otherInput')?.errors?.['required']"
                class="text-red-500"
              >
                {{ radioConfig.errorMessageOther }}
              </small>

              <small
                *ngIf="radioForm.get('otherInput')?.touched && radioForm.get('otherInput')?.errors?.['pattern']"
                class="text-red-500"
              >
                Special characters are not allowed.
              </small>

              <ng-container *ngIf="radioForm.get('otherInput')?.touched && radioForm.get('otherInput')?.errors?.['regexErrors'] as regexErrors">
                <small *ngFor="let err of regexErrors | keyvalue" class="text-red-500 block">
                  {{ err.value }}
                </small>
              </ng-container>
            </span>

            <small class="text-gray-500 whitespace-nowrap ml-auto" *ngIf="!radioForm.get('otherInput')?.disabled">
              {{ remainingChars }} character(s) left
            </small>
          </div>
        </div>

      </div>

      <small
        *ngIf="radioForm.get('selectedRadioOption')?.touched && radioForm.get('selectedRadioOption')?.errors?.['required']"
        class="text-red-500 block mt-1"
      >
        {{ radioConfig.errorMessage }}
      </small>

    </form>
  </div>
</lib-radio-button-with-other-settings-panel>
