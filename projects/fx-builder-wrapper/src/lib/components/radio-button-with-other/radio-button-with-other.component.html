<lib-radio-button-with-other-settings-panel #fxComponent [fxData]="fxData" (configuration)="onSettingsChanged($event)">
  <div [ngClass]="radioConfig.customClass">
    <form [formGroup]="radioForm" class="w-full">

      <label class="radio-label">
        {{ radioConfig.label }}
        <span *ngIf="radioConfig.subLabel" class="sub_label">{{ radioConfig.subLabel }}</span>
        <span class="field-required" *ngIf="isRequired">*</span>
      </label>

      <!-- ── Radio mode ── -->
      <ng-container *ngIf="radioConfig.displayMode !== 'button'">
        <div class="grid grid-cols-4 gap-3 items-start">

          <!-- Regular options (all except Other) -->
          <label
            *ngFor="let opt of regularOptions"
            class="flex items-center gap-2 cursor-pointer text-gray-700 py-1"
          >
            <input
              type="radio"
              formControlName="selectedRadioOption"
              [value]="opt.value"
              (change)="onSelectionChange(opt.value)"
              class="w-4 h-4 accent-blue-600 cursor-pointer flex-shrink-0 mt-1"
            />
            <span class="radio_label">{{ opt.label }}</span>
          </label>

          <!-- Other: combined (not in last col + textarea visible) → spans 2 cols, same line -->
          <div
            *ngIf="combineOtherWithTextarea"
            [style.grid-column]="'span 2'"
            class="flex flex-row gap-3 items-start"
          >
            <label class="flex items-start gap-2 cursor-pointer text-gray-700 py-1 flex-shrink-0">
              <input
                type="radio"
                formControlName="selectedRadioOption"
                value="other"
                (change)="onSelectionChange('other')"
                class="w-4 h-4 accent-blue-600 cursor-pointer flex-shrink-0 mt-1"
              />
              <span class="radio_label">{{ otherOption?.label }}</span>
            </label>
            <div class="flex-1">
              <ng-container *ngTemplateOutlet="otherTextarea"></ng-container>
            </div>
          </div>

          <!-- Other: separate (in last col OR textarea not visible) -->
          <ng-container *ngIf="otherOption && !combineOtherWithTextarea">
            <label class="flex items-start gap-2 cursor-pointer text-gray-700 py-1">
              <input
                type="radio"
                formControlName="selectedRadioOption"
                value="other"
                (change)="onSelectionChange('other')"
                class="w-4 h-4 accent-blue-600 cursor-pointer flex-shrink-0 mt-1"
              />
              <span class="radio_label">{{ otherOption?.label }}</span>
            </label>
            <div *ngIf="showOtherInput" [style.grid-column]="textareaGridColumn">
              <ng-container *ngTemplateOutlet="otherTextarea"></ng-container>
            </div>
          </ng-container>

        </div>
      </ng-container>

      <!-- ── Button mode ── -->
      <ng-container *ngIf="radioConfig.displayMode === 'button'">
        <div class="flex flex-wrap" style="gap: 10px; align-items: stretch;">

          <button
            *ngFor="let opt of regularOptions"
            type="button"
            (click)="onSelectionChange(opt.value); radioForm.get('selectedRadioOption')?.setValue(opt.value)"
            [ngClass]="{
              'rbo-btn-option--selected': radioForm.get('selectedRadioOption')?.value === opt.value
            }"
            class="rbo-btn-option"
          >{{ opt.label }}</button>

          <button
            *ngIf="otherOption"
            type="button"
            (click)="onSelectionChange('other'); radioForm.get('selectedRadioOption')?.setValue('other')"
            [ngClass]="{
              'rbo-btn-option--selected': radioForm.get('selectedRadioOption')?.value === 'other'
            }"
            class="rbo-btn-option"
          >{{ otherOption.label }}</button>

          <!-- Textarea: fills remaining space in the same row if available, wraps to next line if not -->
          <div
            *ngIf="showOtherInput"
            class="rbo-btn-textarea-container"
          >
            <ng-container *ngTemplateOutlet="otherTextarea"></ng-container>
          </div>

        </div>
      </ng-container>

      <small
        *ngIf="radioForm.get('selectedRadioOption')?.touched && radioForm.get('selectedRadioOption')?.errors?.['required']"
        class="error_message block mt-1"
      >
        {{ radioConfig.errorMessage }}
      </small>

      <!-- Textarea template (reused in both combined and separate cases) -->
      <ng-template #otherTextarea>
        <div class="relative">
          <label class="input-label text-gray-700 block mb-1">
            {{ radioConfig.otherLabel }} <span class="field-required" *ngIf="isChildRequired">*</span>
          </label>

          <textarea
            formControlName="otherInput"
            placeholder="{{ radioConfig.otherPlaceholder }}"
            class="border border-gray-300 rounded-lg p-3 w-full resize-none shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"

            [maxlength]="otherMaxLength"
            [ngClass]="{
              'bg-gray-100 text-gray-400 border-gray-300 cursor-not-allowed': radioForm.get('otherInput')?.disabled
            }"
          ></textarea>

          <div class="flex justify-between items-start">
            <small *ngIf="radioForm.get('otherInput')?.touched && radioForm.get('otherInput')?.errors?.['required']"
              class="error_message">
              {{ radioConfig.errorMessageOther }}
            </small>
            <small *ngIf="radioForm.get('otherInput')?.touched && radioForm.get('otherInput')?.errors?.['pattern']"
              class="error_message">
              Special characters are not allowed.
            </small>
            <ng-container
              *ngIf="radioForm.get('otherInput')?.touched && radioForm.get('otherInput')?.errors?.['regexErrors'] as regexErrors">
              <small *ngFor="let err of regexErrors | keyvalue" class="error_message block">
                {{ err.value }}
              </small>
            </ng-container>
            <small class="character_color whitespace-nowrap ml-auto" *ngIf="!radioForm.get('otherInput')?.disabled">
              {{ remainingChars }} character(s) left
            </small>
          </div>
        </div>
      </ng-template>

    </form>
  </div>
</lib-radio-button-with-other-settings-panel>
